<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeHub - Бүртгүүлэх</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/signup.css">
  <script src="../navbar.js" defer></script>
  <script src="../data_handler.js" defer></script>
</head>
<body>
  <div id="site-header-mount"></div>

  <main class="main-content">
    <section class="auth-section">
      <div class="container auth-layout">
        <div class="auth-copy">
          <p class="eyebrow">Бүртгэл</p>
          <h2 id="auth-page-title"></h2>
          <p id="auth-page-copy"></p>
          <div class="info-card">
            <h3 id="auth-info-title"></h3>
            <ul id="auth-info-list"></ul>
          </div>
        </div>

        <form class="auth-form">
          <h3 id="auth-form-title"></h3>

          <label>
            <span>И-мэйл</span>
            <input type="email" placeholder="name@example.com">
          </label>

          <label>
            <span>Нууц үг</span>
            <input type="password" placeholder="Нууц үгээ оруулна уу">
          </label>

          <div class="row">
            <label class="check-row">
              <input type="checkbox">
              <span>Намайг сана</span>
            </label>
            <a class="text-link" href="#">Нууц үг мартсан?</a>
          </div>

          <button type="submit" class="primary-button" id="auth-submit-button"></button>

          <div class="signup-cta">
            <p class="switch-text" id="auth-switch-text"></p>
            <a class="secondary-button" id="auth-switch-link" href="login.html"></a>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
