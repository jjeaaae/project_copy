
<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecipeHub — Жорууд</title>

  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/index.css" />
  <script src="../navbar.js" defer></script>
  <script type="module" src="../data_handler.js"></script>
</head>
<body>
  <div id="site-header-mount"></div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-label" id="index-hero-label"></div>
    <h1 id="index-hero-title"></h1>
    <p class="hero-sub" id="index-hero-sub"></p>
  </section>

  <!-- MAIN -->
  <main class="main">

    <!-- STEP 1 -->
    <div class="section-label">Алхам 1</div>
    <div class="step-card">
      <div class="step-num">01</div>
      <div class="step-title" id="index-step-one-title"></div>
      <div class="step-desc" id="index-step-one-desc"></div>
      <div class="opt-badge">Заавал биш</div>
      <div class="pills" id="moods"></div>
    </div>

    <!-- STEP 2 -->
    <div class="section-label">Алхам 2</div>
    <div class="step-card">
      <div class="step-num">02</div>
      <div class="step-title" id="index-step-two-title"></div>
      <div class="step-desc" id="index-step-two-desc"></div>
      <div class="opt-badge">Заавал биш</div>
      <div class="craving-grid" id="cravings"></div>
    </div>

    <!-- STEP 3 -->
    <div class="section-label">Алхам 3</div>
    <div class="step-card">
      <div class="step-num">03</div>
      <div class="step-title" id="index-step-three-title"></div>
      <div class="step-desc" id="index-step-three-desc"></div>
      <div class="opt-badge">Заавал биш</div>
      <div class="word-row">
        <div class="word-box"><span class="w-num">Үг 1</span><input id="w1" placeholder="Жишээ: залхуу…" /></div>
        <div class="word-box"><span class="w-num">Үг 2</span><input id="w2" placeholder="Жишээ: хүйтэн…" /></div>
        <div class="word-box"><span class="w-num">Үг 3</span><input id="w3" placeholder="Жишээ: гэртээ…" /></div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-area">
      <button class="cta-btn" onclick="recommend()">
        <span id="index-cta-text"></span> <span class="cta-arrow">→</span>
      </button>
      <span class="cta-hint" id="index-cta-hint"></span>
    </div>

    <!-- RESULTS -->
    <div class="result-section" id="results" style="display:none">
      <div class="result-label" id="index-result-label"></div>
      <div class="result-grid" id="rgrid"></div>
    </div>

  </main>
</body>
</html>
